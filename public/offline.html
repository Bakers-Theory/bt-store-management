<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Bakers Theory</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fdf6ee;
        color: #7c4a1e;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 1.375rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        color: #a07a55;
        max-width: 28ch;
        line-height: 1.5;
      }
      button {
        border: none;
        background: #7c4a1e;
        color: #fff;
        font-size: 1rem;
        padding: 12px 24px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You're offline</h1>
      <p>Bakers Theory needs an internet connection to load fresh data. Please reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
