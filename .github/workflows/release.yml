name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version and generate notes
        id: notes
        env:
          BUMP: ${{ inputs.bump }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release-notes.mjs

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"

      # Releases created with the default GITHUB_TOKEN don't trigger other
      # workflows (GitHub suppresses that cascade to prevent infinite runs),
      # so `deploy.yml`'s `release: published` trigger would never fire on its
      # own here. workflow_dispatch is exempt from that restriction, so
      # dispatch it explicitly instead of relying on the release event.
      - name: Trigger production deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "${{ steps.notes.outputs.tag }}"
