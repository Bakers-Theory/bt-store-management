name: Deploy to Vercel

# Fires whenever a GitHub Release is published — including the releases
# created by the `Release` workflow's `gh release create` step — so cutting a
# release is what promotes a build to production, decoupled from every push
# to main. `workflow_dispatch` is kept as a manual escape hatch (e.g. to
# re-deploy the current release without cutting a new one).
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # A prebuilt CLI deploy skips Vercel's own git-triggered build pipeline
      # entirely — the app is built right here in the runner and the finished
      # output is just uploaded. That means "Ignored Build Step" (set to only
      # build Preview) never gets a chance to cancel it, unlike a Deploy Hook
      # call, which still goes through that same gate as a git push would.
      - name: Pull Vercel project settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
